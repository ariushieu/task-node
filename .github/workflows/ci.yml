name: CI - Build and Test

on:
  push:
    branches-ignore:
      - master                        # skip CI on master — CD handles it
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build with Maven
        run: mvn clean install -DskipTests    # TODO: add H2 test profile to enable tests
